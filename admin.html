<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>SU 명함 관리자</title>
  <link rel="manifest" href="manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="SU 관리">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#343a40">
  <script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
  <style>
    body {
      font-family: sans-serif;
      padding: 20px;
      max-width: 1000px;
      margin: auto;
    }
    table {
      border-collapse: collapse;
      width: 100%;
      margin-top: 20px;
      font-size: 0.9em;
    }
    th, td {
      border: 1px solid #ccc;
      padding: 8px;
      text-align: left;
      word-break: break-word;
    }
    th {
      cursor: pointer;
      background-color: #f2f2f2;
    }
    input[type="text"] {
      padding: 8px;
      margin: 10px 0;
      width: 100%;
      max-width: 400px;
    }
    .pagination {
      margin-top: 15px;
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }
    .pagination button {
      padding: 6px 12px;
      border: 1px solid #007bff;
      background: white;
      color: #007bff;
      cursor: pointer;
      border-radius: 4px;
    }
    .pagination button.active {
      background: #007bff;
      color: white;
    }
    @media (max-width: 600px) {
      table, thead, tbody, th, td, tr {
        display: block;
        width: 100%;
      }
      th {
        display: none;
      }
      td {
        border: none;
        border-bottom: 1px solid #ddd;
        position: relative;
        padding-left: 50%;
      }
      td::before {
        position: absolute;
        left: 10px;
        top: 8px;
        white-space: nowrap;
        font-weight: bold;
      }
    }
  </style>
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import {
      getAuth,
      signInWithEmailAndPassword,
      signOut,
      onAuthStateChanged,
      setPersistence,
      browserLocalPersistence
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js";
    import {
      getFirestore,
      collection,
      getDocs,
      addDoc,
      Timestamp
    } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCkjC3jGH0cYxjDjkau5E9p73y4rgDcc44",
      authDomain: "sudesign-namecard.firebaseapp.com",
      projectId: "sudesign-namecard",
      storageBucket: "sudesign-namecard.firebasestorage.app",
      messagingSenderId: "67523972912",
      appId: "1:67523972912:web:0b11636b5f3deeec5742f5"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    await setPersistence(auth, browserLocalPersistence);

    let allData = [];
    let currentPage = 1;
    const recordsPerPage = 10;

    // 생체인증 연동: 기기 Credential Manager에 저장
    async function saveCredentials(email, password) {
      if (!window.PasswordCredential) return;
      try {
        const cred = new PasswordCredential({ id: email, password, name: '에스유디자인 관리자' });
        await navigator.credentials.store(cred);
      } catch (e) {}
    }

    // 자동 로그인 (UI 없이, 저장된 자격증명 사용)
    async function tryAutoLogin() {
      if (!navigator.credentials) return false;
      try {
        const cred = await navigator.credentials.get({ password: true, mediation: 'silent' });
        if (cred?.type === 'password') {
          await signInWithEmailAndPassword(auth, cred.id, cred.password);
          return true;
        }
      } catch (e) {}
      return false;
    }

    // 생체인증 버튼 탭 시 호출 (Face ID / 지문 / PIN 다이얼로그 표시)
    window.triggerBiometric = async () => {
      if (!navigator.credentials) { showPasswordForm(); return; }
      try {
        const cred = await navigator.credentials.get({ password: true, mediation: 'required' });
        if (cred?.type === 'password') {
          await signInWithEmailAndPassword(auth, cred.id, cred.password);
        }
      } catch (e) {
        showPasswordForm();
      }
    };

    function showPasswordForm() {
      document.getElementById('passwordForm').style.display = 'block';
      document.getElementById('biometricBtn').style.display = 'none';
    }

    async function login() {
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      try {
        await signInWithEmailAndPassword(auth, email, password);
        await saveCredentials(email, password);
      } catch (error) {
        document.getElementById('loginError').textContent = '이메일 또는 비밀번호가 올바르지 않습니다.';
      }
    }

    window.logout = async () => {
      await navigator.credentials?.preventSilentAccess?.();
      await signOut(auth);
      document.getElementById('adminSection').style.display = 'none';
      document.getElementById('loginSection').style.display = 'block';
      document.getElementById('biometricBtn').style.display =
        (navigator.credentials && window.PasswordCredential) ? 'block' : 'none';
      document.getElementById('passwordForm').style.display = 'none';
    };

    async function addSampleRecord() {
      await addDoc(collection(db, "scan_records"), {
        name: "홍길동",
        address: "서울시 강남구 테헤란로 123",
        message: "샘플 메시지입니다.",
        imageUrl: "https://via.placeholder.com/100",
        timestamp: Timestamp.now()
      });
      alert("샘플 기록이 추가되었습니다!");
    }

    function paginate(data, page) {
      const start = (page - 1) * recordsPerPage;
      return data.slice(start, start + recordsPerPage);
    }

    function renderTable(dataArray) {
      const table = document.getElementById("recordsTable");
      table.innerHTML = "<tr><th onclick=\"sortTable(0)\">이름</th><th onclick=\"sortTable(1)\">주소</th><th onclick=\"sortTable(2)\">시간</th><th onclick=\"sortTable(3)\">메시지</th><th onclick=\"sortTable(4)\">내메모</th><th>이미지</th></tr>";
      const pageData = paginate(dataArray, currentPage);

      pageData.forEach(data => {
        const row = table.insertRow();
        row.insertCell(0).textContent = data.이름 || "";
        row.insertCell(1).textContent = data.주소 || "";
        row.insertCell(2).textContent = data.시간 || "";
        row.insertCell(3).textContent = data.메시지 || "";
        row.insertCell(4).textContent = data.내메모 || "";
        const imgCell = row.insertCell(5);
        if (data.이미지) {
          const img = document.createElement("img");
          img.src = data.이미지;
          img.width = 60;
          imgCell.appendChild(img);
        } else {
          imgCell.textContent = "없음";
        }
      });
      renderPagination(dataArray.length);
    }

    function renderPagination(total) {
      const container = document.getElementById("pagination");
      container.innerHTML = "";
      const totalPages = Math.ceil(total / recordsPerPage);
      for (let i = 1; i <= totalPages; i++) {
        const btn = document.createElement("button");
        btn.textContent = i;
        if (i === currentPage) btn.classList.add("active");
        btn.onclick = () => {
          currentPage = i;
          renderTable(filteredData);
        };
        container.appendChild(btn);
      }
    }

    let filteredData = [];
    function filterTable() {
      const query = document.getElementById("searchInput").value.toLowerCase();
      filteredData = allData.filter(d =>
        d.이름.toLowerCase().includes(query) ||
        d.주소.toLowerCase().includes(query) ||
        d.메시지.toLowerCase().includes(query)
      );
      currentPage = 1;
      renderTable(filteredData);
    }

    let sortAsc = true;
    function sortTable(colIndex) {
      const keys = ["이름", "주소", "시간", "메시지", "내메모"];
      const key = keys[colIndex];
      filteredData.sort((a, b) => {
        const valA = a[key] || "";
        const valB = b[key] || "";
        return sortAsc ? valA.localeCompare(valB) : valB.localeCompare(valA);
      });
      sortAsc = !sortAsc;
      renderTable(filteredData);
    }

    onAuthStateChanged(auth, async (user) => {
      document.getElementById('loadingState').style.display = 'none';
      if (user) {
        document.getElementById("loginSection").style.display = "none";
        document.getElementById("adminSection").style.display = "block";

        const querySnapshot = await getDocs(collection(db, "scan_records"));
        allData = [];

        querySnapshot.forEach((doc) => {
          const data = doc.data();
          allData.push({
            이름: data.name || "",
            주소: data.address || "",
            시간: new Date(data.timestamp?.seconds * 1000).toLocaleString(),
            메시지: data.message || "",
            내메모: data.ownerMemo || "",
            이미지: data.image || ""
          });
        });

        filteredData = allData;
        renderTable(filteredData);

        window.exportExcel = () => {
          const worksheet = XLSX.utils.json_to_sheet(allData);
          const workbook = XLSX.utils.book_new();
          XLSX.utils.book_append_sheet(workbook, worksheet, "명함기록");
          XLSX.writeFile(workbook, "명함기록.xlsx");
        };
      } else {
        const ok = await tryAutoLogin();
        if (!ok) {
          document.getElementById("loginSection").style.display = "block";
          if (navigator.credentials && window.PasswordCredential) {
            document.getElementById('biometricBtn').style.display = 'block';
          } else {
            showPasswordForm();
          }
        }
      }
    });

    const BASE_URL = "https://kkh2114.github.io/sudesign-namecard/";

    window.generateQR = () => {
      const memo = document.getElementById('memoInput').value.trim();
      const url = memo ? `${BASE_URL}?memo=${encodeURIComponent(memo)}` : BASE_URL;

      document.getElementById('qrcode').innerHTML = "";
      new QRCode(document.getElementById('qrcode'), { text: url, width: 200, height: 200 });
      document.getElementById('qrUrl').textContent = url;
      document.getElementById('copyBtn').style.display = 'inline-block';
      window._currentQRUrl = url;
    };

    window.copyQRUrl = () => {
      navigator.clipboard.writeText(window._currentQRUrl).then(() => alert('URL이 복사되었습니다!'));
    };

    window.login = login;
    window.showPasswordForm = showPasswordForm;
    window.addSampleRecord = addSampleRecord;
    window.filterTable = filterTable;
    window.sortTable = sortTable;
  </script>
</head>
<body>
  <div id="installBanner" style="display:none; background:#343a40; color:#fff; border-radius:12px; padding:14px 16px; margin-bottom:20px; font-size:14px; line-height:1.6;">
    <strong>📲 홈 화면에 추가하는 방법</strong><br>
    <span id="installGuideText"></span>
    <br><button onclick="document.getElementById('installBanner').style.display='none'" style="margin-top:8px; background:transparent; border:1px solid #fff; color:#fff; padding:4px 12px; border-radius:6px; font-size:13px; cursor:pointer;">닫기</button>
  </div>

  <!-- 초기 로딩 -->
  <div id="loadingState" style="text-align:center; padding:60px 0; color:#888; font-size:15px;">
    ⏳ 인증 확인 중...
  </div>

  <div id="loginSection" style="display:none; max-width:360px; margin:60px auto; padding:0 20px;">
    <div style="text-align:center; margin-bottom:32px;">
      <img src="icon-192.png" style="width:72px; border-radius:18px; margin-bottom:12px;">
      <h2 style="font-size:20px; margin:0;">에스유디자인 관리자</h2>
    </div>

    <!-- 생체인증 버튼 (저장된 자격증명 있을 때) -->
    <button id="biometricBtn" onclick="triggerBiometric()" style="display:none; width:100%; padding:16px; background:#343a40; color:#fff; border:none; border-radius:14px; font-size:17px; font-weight:bold; cursor:pointer; margin-bottom:16px;">
      🔒 생체인증으로 로그인
    </button>

    <!-- 이메일/비밀번호 폼 (첫 로그인 또는 생체인증 실패 시) -->
    <div id="passwordForm" style="display:none;">
      <input type="email" id="email" placeholder="이메일 입력"
        style="width:100%; padding:13px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px; font-size:15px; box-sizing:border-box;" />
      <input type="password" id="password" placeholder="비밀번호 입력"
        style="width:100%; padding:13px; margin-bottom:10px; border:1px solid #ddd; border-radius:10px; font-size:15px; box-sizing:border-box;" />
      <p id="loginError" style="color:#dc3545; font-size:13px; margin:0 0 10px;"></p>
      <button onclick="login()" style="width:100%; padding:14px; background:#007bff; color:#fff; border:none; border-radius:10px; font-size:16px; font-weight:bold; cursor:pointer;">로그인</button>
      <p style="text-align:center; margin-top:8px; font-size:12px; color:#aaa;">로그인 후 생체인증이 자동 등록됩니다</p>
    </div>

    <!-- 생체인증 버튼 있을 때 다른 방법 링크 -->
    <p style="text-align:center; margin-top:12px;">
      <button onclick="showPasswordForm()" style="background:none;border:none;color:#888;font-size:13px;cursor:pointer;text-decoration:underline;">다른 방법으로 로그인</button>
    </p>

    <p style="text-align:center; margin-top:8px;">
      <button onclick="showInstallGuide()" style="background:none;border:none;color:#007bff;font-size:13px;cursor:pointer;text-decoration:underline;">📲 홈 화면에 추가하는 방법</button>
    </p>
  </div>

  <script>
    function showInstallGuide() {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      const isAndroid = /Android/.test(navigator.userAgent);
      let guide = "";
      if (isIOS) {
        guide = "① Safari 하단 공유 버튼(□↑) 탭 → ② '홈 화면에 추가' 탭 → ③ '추가' 탭";
      } else if (isAndroid) {
        guide = "① Chrome 우측 상단 ⋮ 메뉴 탭 → ② '홈 화면에 추가' 탭 → ③ '추가' 탭";
      } else {
        guide = "브라우저 메뉴에서 '홈 화면에 추가' 또는 '앱 설치'를 선택하세요.";
      }
      document.getElementById('installGuideText').textContent = guide;
      document.getElementById('installBanner').style.display = 'block';
    }
  </script>

  <div id="adminSection" style="display:none;">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:16px;">
      <h2 style="margin:0;">에스유디자인 관리자</h2>
      <button onclick="logout()" style="background:none; border:1px solid #ccc; padding:6px 14px; border-radius:8px; font-size:13px; color:#666; cursor:pointer;">로그아웃</button>
    </div>

    <!-- QR 생성 -->
    <div style="border:1px solid #ddd;border-radius:12px;padding:20px;margin-bottom:28px;background:#fafafa;">
      <h3 style="margin-bottom:6px;">📲 QR코드 생성</h3>
      <p style="font-size:13px;color:#888;margin-bottom:12px;">메모를 입력하면 연락처 저장 시 메모란에 자동 주입됩니다. 장소나 상황마다 새로 입력하세요.</p>
      <input type="text" id="memoInput" placeholder="예: 2026년 삼정호텔 동문모임에서 뵈었습니다"
        style="width:100%;max-width:500px;padding:10px;border:1px solid #ccc;border-radius:8px;font-size:14px;margin-bottom:10px;" />
      <br>
      <button onclick="generateQR()" style="margin-right:8px;">QR 생성</button>
      <button onclick="copyQRUrl()" id="copyBtn" style="display:none;">🔗 URL 복사</button>
      <div id="qrcode" style="margin-top:16px;display:inline-block;"></div>
      <p id="qrUrl" style="font-size:12px;color:#555;margin-top:8px;word-break:break-all;max-width:500px;"></p>
    </div>

    <h2>명함 수신 기록</h2>
    <input type="text" id="searchInput" oninput="filterTable()" placeholder="이름, 주소, 메시지 검색" />
    <button onclick="exportExcel()">📥 엑셀로 다운로드</button>
    <button onclick="addSampleRecord()">🧪 샘플 데이터 추가</button>
    <table id="recordsTable"></table>
    <div id="pagination" class="pagination"></div>
  </div>
</body>
</html>
