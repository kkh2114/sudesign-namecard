<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>김길호 디지털 명함</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      margin-top: 30px;
      padding: 30px 24px;
      border-radius: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 420px;
    }
    .profile-section {
      text-align: center;
      margin-bottom: 20px;
    }
    .profile-img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #e9ecef;
      margin-bottom: 12px;
    }
    .card h1 { font-size: 22px; margin-bottom: 4px; }
    .card .subtitle { font-size: 14px; color: #666; margin-bottom: 16px; }
    .info-row {
      display: flex;
      align-items: center;
      padding: 8px 0;
      font-size: 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .info-row:last-child { border-bottom: none; }
    .info-icon { width: 24px; text-align: center; margin-right: 10px; flex-shrink: 0; }
    .info-row a { color: #007bff; text-decoration: none; }

    /* 단계 1: 연락처 저장 버튼 */
    .btn-save {
      display: block;
      background: linear-gradient(135deg, #343a40, #495057);
      color: white;
      padding: 16px;
      margin: 24px 0 0;
      width: 100%;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-save:active { transform: scale(0.98); }

    /* 단계 2: 메시지 박스 (처음에 숨김) */
    .message-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .message-overlay.show { display: flex; }
    .message-box {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .message-box h3 {
      font-size: 17px;
      margin-bottom: 6px;
      color: #333;
    }
    .message-box .desc {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }
    .message-box input, .message-box textarea {
      padding: 13px;
      margin: 8px 0;
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 15px;
      box-sizing: border-box;
    }
    .message-box textarea {
      resize: vertical;
      min-height: 80px;
    }
    .message-box input[type="file"] {
      padding: 10px;
      font-size: 13px;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .btn-submit {
      flex: 2;
      background: #007bff;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-submit:hover { background: #0056b3; }
    .btn-skip {
      flex: 1;
      background: #e9ecef;
      color: #666;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
    }
    .btn-skip:hover { background: #dee2e6; }
    #statusMsg {
      margin-top: 12px;
      font-weight: bold;
      font-size: 14px;
      text-align: center;
    }
    #loading {
      display: none;
      margin-top: 10px;
      color: #007bff;
      font-weight: bold;
      text-align: center;
    }
    .done-msg {
      text-align: center;
      padding: 20px 0;
      color: #28a745;
      font-size: 15px;
      font-weight: bold;
    }
  </style>
</head>
<body>

  <!-- ===== 단계 1: 명함 카드 + 연락처 저장 ===== -->
  <div class="card" id="step1">
    <div class="profile-section">
      <img src="profile.jpg" class="profile-img" alt="김길호" onerror="this.style.display='none'">
      <h1>김길호</h1>
      <div class="subtitle">대표이사 · 에스유디자인(주)</div>
    </div>

    <div class="info-row"><span class="info-icon">📞</span> 02-414-0622</div>
    <div class="info-row"><span class="info-icon">📠</span> 02-414-0623</div>
    <div class="info-row"><span class="info-icon">📱</span> <a href="tel:010-2749-2157">010-2749-2157</a></div>
    <div class="info-row"><span class="info-icon">📧</span> <a href="mailto:sudesignoffice@gmail.com">sudesignoffice@gmail.com</a></div>
    <div class="info-row"><span class="info-icon">🏢</span> 서울시 송파구 올림픽로 35가길 10, 더샵스타파크 A-203</div>
    <div class="info-row"><span class="info-icon">🔗</span> <a href="https://litt.ly/kghcoach" target="_blank">프로필 보기</a></div>

    <a class="btn-save" href="kim-gilho.vcf" id="vcfLink" download onclick="onVcfClick()">📥 연락처 저장하기</a>
  </div>

  <!-- ===== 단계 2: 메시지 박스 (오버레이) ===== -->
  <div class="message-overlay" id="msgOverlay">
    <div class="message-box">
      <h3>😊 반갑습니다!</h3>
      <p class="desc">이름과 메시지를 남겨주시면 인연을 기억하겠습니다.<br>건너뛰셔도 됩니다.</p>
      <input type="text" id="receiverName" placeholder="이름" />
      <input type="file" id="receiverImage" accept="image/*" capture="environment" />
      <textarea id="receiverMessage" placeholder="메시지를 남겨주세요 (선택)"></textarea>
      <p id="loading">⏳ 전송 중입니다...</p>
      <p id="statusMsg"></p>
      <div class="btn-row">
        <button class="btn-skip" onclick="closeOverlay()">건너뛰기</button>
        <button class="btn-submit" onclick="submitRecord()">보내기</button>
      </div>
    </div>
  </div>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-storage.js";

    const firebaseConfig = {
      apiKey: "AIzaSyCkjC3jGH0cYxjDjkau5E9p73y4rgDcc44",
      authDomain: "sudesign-namecard.firebaseapp.com",
      projectId: "sudesign-namecard",
      storageBucket: "sudesign-namecard.firebasestorage.app",
      messagingSenderId: "67523972912",
      appId: "1:67523972912:web:0b11636b5f3deeec5742f5",
      measurementId: "G-SRPYW06VWB"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // 단계 1: VCF 다운로드 클릭 → 2초 후 메시지 박스 표시
    window.onVcfClick = () => {
      setTimeout(() => {
        document.getElementById('msgOverlay').classList.add('show');
      }, 2000);
    };

    // 메시지 박스 닫기 (건너뛰기)
    window.closeOverlay = () => {
      document.getElementById('msgOverlay').classList.remove('show');
    };

    // 메시지 전송
    window.submitRecord = async () => {
      const name = document.getElementById("receiverName").value.trim();
      const message = document.getElementById("receiverMessage").value.trim();
      const file = document.getElementById("receiverImage").files[0];
      const msg = document.getElementById("statusMsg");
      const loading = document.getElementById("loading");

      if (!name) {
        msg.innerText = "⚠️ 이름을 입력해주세요.";
        msg.style.color = "#dc3545";
        return;
      }

      msg.innerText = "";
      loading.style.display = "block";

      try {
        let imageURL = "";
        if (file) {
          const storageRef = ref(storage, `received_cards/${Date.now()}_${file.name}`);
          await uploadBytes(storageRef, file);
          imageURL = await getDownloadURL(storageRef);
        }

        // 위치 정보 (선택, 실패해도 진행)
        let lat = null, lng = null, address = "";
        try {
          const pos = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
          });
          lat = pos.coords.latitude;
          lng = pos.coords.longitude;
          const geoRes = await fetch(`https://dapi.kakao.com/v2/local/geo/coord2address.json?x=${lng}&y=${lat}`, {
            headers: { Authorization: 'KakaoAK 35e17a3de123d2c236d1c5bfedafa411' }
          });
          const geoData = await geoRes.json();
          address = geoData.documents[0]?.address?.address_name || "";
        } catch {}

        await addDoc(collection(db, "scan_records"), {
          name, message, image: imageURL,
          latitude: lat, longitude: lng, address,
          timestamp: serverTimestamp()
        });

        loading.style.display = "none";
        msg.innerText = "✅ 감사합니다! 좋은 인연이 되길 바랍니다.";
        msg.style.color = "#28a745";

        setTimeout(() => {
          document.getElementById('msgOverlay').classList.remove('show');
        }, 2000);

      } catch (e) {
        loading.style.display = "none";
        msg.innerText = "❌ 전송에 실패했습니다. 다시 시도해주세요.";
        msg.style.color = "#dc3545";
      }
    };
  </script>
</body>
</html>
