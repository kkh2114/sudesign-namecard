<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <title>김길호 디지털 명함</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="manifest" href="namecard-manifest.json">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="김길호 명함">
  <link rel="apple-touch-icon" href="icon-192.png">
  <meta name="theme-color" content="#343a40">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f4f6f9;
      color: #333;
      display: flex;
      flex-direction: column;
      align-items: center;
      min-height: 100vh;
    }
    .card {
      background: #fff;
      margin-top: 30px;
      padding: 30px 24px;
      border-radius: 24px;
      box-shadow: 0 6px 18px rgba(0,0,0,0.1);
      width: 100%;
      max-width: 420px;
    }
    .profile-section {
      text-align: center;
      margin-bottom: 20px;
    }
    .profile-img {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      object-fit: cover;
      border: 3px solid #e9ecef;
      margin-bottom: 12px;
    }
    .card h1 { font-size: 22px; margin-bottom: 4px; }
    .card .subtitle { font-size: 14px; color: #666; margin-bottom: 16px; }
    .info-row {
      display: flex;
      align-items: center;
      padding: 8px 0;
      font-size: 14px;
      border-bottom: 1px solid #f0f0f0;
    }
    .info-row:last-child { border-bottom: none; }
    .info-icon { width: 24px; text-align: center; margin-right: 10px; flex-shrink: 0; }
    .info-row a { color: #007bff; text-decoration: none; }

    /* 단계 1: 연락처 저장 버튼 */
    .btn-save {
      display: block;
      background: linear-gradient(135deg, #343a40, #495057);
      color: white;
      padding: 16px;
      margin: 24px 0 0;
      width: 100%;
      border: none;
      border-radius: 14px;
      font-size: 17px;
      font-weight: bold;
      text-align: center;
      text-decoration: none;
      box-shadow: 0 3px 10px rgba(0,0,0,0.2);
      cursor: pointer;
      transition: transform 0.1s;
    }
    .btn-save:active { transform: scale(0.98); }

    /* 단계 2: 메시지 박스 (처음에 숨김) */
    .message-overlay {
      display: none;
      position: fixed;
      top: 0; left: 0; right: 0; bottom: 0;
      background: rgba(0,0,0,0.5);
      z-index: 1000;
      justify-content: center;
      align-items: center;
      padding: 20px;
    }
    .message-overlay.show { display: flex; }
    .message-box {
      background: #fff;
      border-radius: 20px;
      padding: 28px 24px;
      width: 100%;
      max-width: 400px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.25);
      animation: slideUp 0.3s ease;
    }
    @keyframes slideUp {
      from { transform: translateY(30px); opacity: 0; }
      to { transform: translateY(0); opacity: 1; }
    }
    .message-box h3 {
      font-size: 17px;
      margin-bottom: 6px;
      color: #333;
    }
    .message-box .desc {
      font-size: 13px;
      color: #888;
      margin-bottom: 16px;
    }
    .message-box input, .message-box textarea {
      padding: 13px;
      margin: 8px 0;
      width: 100%;
      border: 1px solid #ddd;
      border-radius: 12px;
      font-size: 15px;
      box-sizing: border-box;
    }
    .message-box textarea {
      resize: vertical;
      min-height: 80px;
    }
    .message-box input[type="file"] {
      padding: 10px;
      font-size: 13px;
    }
    .btn-row {
      display: flex;
      gap: 10px;
      margin-top: 16px;
    }
    .btn-submit {
      flex: 2;
      background: #007bff;
      color: white;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
    }
    .btn-submit:hover { background: #0056b3; }
    .btn-skip {
      flex: 1;
      background: #e9ecef;
      color: #666;
      border: none;
      padding: 14px;
      border-radius: 12px;
      font-size: 15px;
      cursor: pointer;
    }
    .btn-skip:hover { background: #dee2e6; }
    #statusMsg {
      margin-top: 12px;
      font-weight: bold;
      font-size: 14px;
      text-align: center;
    }
    #loading {
      display: none;
      margin-top: 10px;
      color: #007bff;
      font-weight: bold;
      text-align: center;
    }
    .done-msg {
      text-align: center;
      padding: 20px 0;
      color: #28a745;
      font-size: 15px;
      font-weight: bold;
    }
    .install-banner {
      display: none;
      background: #343a40;
      color: #fff;
      border-radius: 14px;
      padding: 14px 16px;
      margin-top: 14px;
      font-size: 13px;
      line-height: 1.7;
    }
    .install-banner button.close-btn {
      margin-top: 8px;
      background: transparent;
      border: 1px solid #fff;
      color: #fff;
      padding: 4px 12px;
      border-radius: 6px;
      font-size: 12px;
      cursor: pointer;
    }
    .btn-install {
      display: none;
      background: #fff;
      color: #343a40;
      border: 1.5px solid #343a40;
      padding: 12px;
      margin-top: 10px;
      width: 100%;
      border-radius: 12px;
      font-size: 15px;
      font-weight: bold;
      text-align: center;
      cursor: pointer;
    }
  </style>
</head>
<body>

  <!-- ===== 단계 1: 명함 카드 + 연락처 저장 ===== -->
  <div class="card" id="step1">
    <div class="profile-section">
      <img src="profile.jpg" class="profile-img" alt="김길호" onerror="this.style.display='none'">
      <h1>김길호</h1>
      <div class="subtitle">대표이사 · 에스유디자인(주)</div>
    </div>

    <div class="info-row"><span class="info-icon">📞</span> 02-414-0622</div>
    <div class="info-row"><span class="info-icon">📠</span> 02-414-0623</div>
    <div class="info-row"><span class="info-icon">📱</span> <a href="tel:010-2749-2157">010-2749-2157</a></div>
    <div class="info-row"><span class="info-icon">📧</span> <span style="color:#999;font-size:12px;margin-right:6px;">회사</span><a href="mailto:sudesignoffice@gmail.com">sudesignoffice@gmail.com</a></div>
    <div class="info-row"><span class="info-icon">📧</span> <span style="color:#999;font-size:12px;margin-right:6px;">개인</span><a href="mailto:sudesigmgo@gmail.com">sudesigmgo@gmail.com</a></div>
    <div class="info-row"><span class="info-icon">🏢</span> 서울시 송파구 올림픽로 35가길 10, 더샵스타파크 A-203</div>
    <div class="info-row"><span class="info-icon">🔗</span> <a href="https://litt.ly/kghcoach" target="_blank">프로필 보기</a></div>

    <button class="btn-save" onclick="downloadVcf()">📥 연락처 저장하기</button>

    <!-- 홈 화면 추가 (Android Chrome: 설치 프롬프트) -->
    <button class="btn-install" id="installBtn">📲 홈 화면에 추가</button>

    <!-- iOS 안내 배너 -->
    <div class="install-banner" id="installBanner">
      <strong>📲 홈 화면에 추가하는 방법</strong><br>
      <span id="installGuideText"></span>
      <br><button class="close-btn" onclick="document.getElementById('installBanner').style.display='none'">닫기</button>
    </div>
  </div>

  <!-- ===== 단계 2: 메시지 박스 (오버레이) ===== -->
  <div class="message-overlay" id="msgOverlay">
    <div class="message-box">
      <h3>😊 반갑습니다!</h3>
      <p class="desc">이름과 메시지를 남겨주시면 인연을 기억하겠습니다.<br>건너뛰셔도 됩니다.</p>
      <input type="text" id="receiverName" placeholder="이름" />
      <input type="file" id="receiverImage" accept="image/*" capture="environment" />
      <textarea id="receiverMessage" placeholder="메시지를 남겨주세요 (선택)"></textarea>
      <p id="loading">⏳ 전송 중입니다...</p>
      <p id="statusMsg"></p>
      <div class="btn-row">
        <button class="btn-skip" onclick="closeOverlay()">건너뛰기</button>
        <button class="btn-submit" onclick="submitRecord()">보내기</button>
      </div>
    </div>
  </div>

  <script>
    // Android: beforeinstallprompt 이벤트로 설치 버튼 표시
    let deferredPrompt = null;
    window.addEventListener('beforeinstallprompt', (e) => {
      e.preventDefault();
      deferredPrompt = e;
      document.getElementById('installBtn').style.display = 'block';
    });
    document.getElementById('installBtn').addEventListener('click', async () => {
      if (!deferredPrompt) return;
      deferredPrompt.prompt();
      await deferredPrompt.userChoice;
      deferredPrompt = null;
      document.getElementById('installBtn').style.display = 'none';
    });

    // iOS: 모바일이지만 beforeinstallprompt 없으면 안내 배너 표시
    window.addEventListener('load', () => {
      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      const isMobile = /Mobi|Android/i.test(navigator.userAgent) || isIOS;
      const isStandalone = window.navigator.standalone === true ||
        window.matchMedia('(display-mode: standalone)').matches;

      if (isMobile && !isStandalone && !deferredPrompt) {
        setTimeout(() => {
          const banner = document.getElementById('installBanner');
          const guideText = document.getElementById('installGuideText');
          if (isIOS) {
            guideText.textContent = '① Safari 하단 공유 버튼(□↑) 탭 → ② "홈 화면에 추가" 탭 → ③ "추가" 탭';
            banner.style.display = 'block';
          }
        }, 4000);
      }
    });
  </script>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js";
    import { getStorage, ref, uploadBytes, getDownloadURL } from "https://www.gstatic.com/firebasejs/11.6.0/firebase-storage.js";

    const ownerMemo = new URLSearchParams(window.location.search).get('memo') || "";

    window.downloadVcf = async () => {
      const btn = document.querySelector('.btn-save');
      btn.textContent = '📍 위치 확인 중...';
      btn.disabled = true;

      // 위치 취득 → 주소 변환 (최대 5초, 실패해도 진행)
      let locationNote = "";
      try {
        const pos = await new Promise((resolve, reject) =>
          navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 })
        );
        const { latitude: lat, longitude: lng } = pos.coords;
        try {
          const res = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ko`,
            { headers: { 'User-Agent': 'sudesign-namecard/1.0' } }
          );
          const data = await res.json();
          const address = data.address?.road
            ? `${data.address.city || data.address.county || ''} ${data.address.road || ''}`.trim()
            : data.display_name?.split(',').slice(0, 3).join(',').trim();
          if (address) locationNote = `이 명함은 ${address}에서 기록되었습니다.`;
        } catch {}
      } catch {}

      // NOTE 필드: 위치(자동) + ownerMemo(선택) 별도 줄로 결합
      const noteParts = [locationNote, ownerMemo].filter(Boolean);
      const noteField = noteParts.length > 0 ? `NOTE:${noteParts.join('\\n')}\n` : "";

      const vcf = `BEGIN:VCARD\nVERSION:3.0\nN:김;길호;;;\nFN:김길호\nORG:에스유디자인(주)\nTITLE:대표이사\nTEL;TYPE=WORK,VOICE:02-414-0622\nTEL;TYPE=CELL,VOICE:010-2749-2157\nEMAIL:sudesignoffice@gmail.com\nEMAIL:sudesigmgo@gmail.com\nADR:;;서울시 송파구 올림픽로 35가길 10, 더샵스타파크 A-203;;;;;\nURL:https://litt.ly/kghcoach\nPHOTO;VALUE=URI:https://kkh2114.github.io/profile.jpg\n${noteField}END:VCARD`;

      btn.textContent = '📥 연락처 저장하기';
      btn.disabled = false;

      const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent);
      if (isIOS) {
        window.location.href = 'data:text/vcard;charset=utf-8,' + encodeURIComponent(vcf);
      } else {
        const blob = new Blob([vcf], { type: 'text/vcard;charset=utf-8' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = 'kim-gilho.vcf';
        a.click();
        URL.revokeObjectURL(url);
      }

      setTimeout(() => {
        document.getElementById('msgOverlay').classList.add('show');
      }, 2000);
    };

    const firebaseConfig = {
      apiKey: "AIzaSyCkjC3jGH0cYxjDjkau5E9p73y4rgDcc44",
      authDomain: "sudesign-namecard.firebaseapp.com",
      projectId: "sudesign-namecard",
      storageBucket: "sudesign-namecard.firebasestorage.app",
      messagingSenderId: "67523972912",
      appId: "1:67523972912:web:0b11636b5f3deeec5742f5",
      measurementId: "G-SRPYW06VWB"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const storage = getStorage(app);

    // 메시지 박스 닫기 (건너뛰기)
    window.closeOverlay = () => {
      document.getElementById('msgOverlay').classList.remove('show');
    };

    // 메시지 전송
    window.submitRecord = async () => {
      const name = document.getElementById("receiverName").value.trim();
      const message = document.getElementById("receiverMessage").value.trim();
      const file = document.getElementById("receiverImage").files[0];
      const msg = document.getElementById("statusMsg");
      const loading = document.getElementById("loading");

      if (!name) {
        msg.innerText = "⚠️ 이름을 입력해주세요.";
        msg.style.color = "#dc3545";
        return;
      }

      msg.innerText = "";
      loading.style.display = "block";

      try {
        let imageURL = "";
        if (file) {
          const storageRef = ref(storage, `received_cards/${Date.now()}_${file.name}`);
          await uploadBytes(storageRef, file);
          imageURL = await getDownloadURL(storageRef);
        }

        // 위치 정보 (선택, 실패해도 진행)
        let lat = null, lng = null, address = "";
        try {
          const pos = await new Promise((resolve, reject) => {
            navigator.geolocation.getCurrentPosition(resolve, reject, { timeout: 5000 });
          });
          lat = pos.coords.latitude;
          lng = pos.coords.longitude;
          const geoRes = await fetch(
            `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=ko`,
            { headers: { 'User-Agent': 'sudesign-namecard/1.0' } }
          );
          const geoData = await geoRes.json();
          address = geoData.address?.road
            ? `${geoData.address.city || geoData.address.county || ''} ${geoData.address.road || ''}`.trim()
            : geoData.display_name?.split(',').slice(0, 3).join(',').trim() || "";
        } catch {}

        await addDoc(collection(db, "scan_records"), {
          name, message, image: imageURL,
          latitude: lat, longitude: lng, address,
          ownerMemo,
          timestamp: serverTimestamp()
        });

        loading.style.display = "none";
        msg.innerText = "✅ 감사합니다! 좋은 인연이 되길 바랍니다.";
        msg.style.color = "#28a745";

        setTimeout(() => {
          document.getElementById('msgOverlay').classList.remove('show');
        }, 2000);

      } catch (e) {
        loading.style.display = "none";
        msg.innerText = "❌ 전송에 실패했습니다. 다시 시도해주세요.";
        msg.style.color = "#dc3545";
      }
    };
  </script>
</body>
</html>
